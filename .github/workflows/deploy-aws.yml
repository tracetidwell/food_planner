name: Deploy to AWS App Runner

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: meal-planner-backend
  APPRUNNER_SERVICE_NAME: meal-planner-backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to App Runner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName==\`${APPRUNNER_SERVICE_NAME}\`].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" == "None" ]; then
            echo "Error: App Runner service '${APPRUNNER_SERVICE_NAME}' not found."
            exit 1
          fi

          echo "Starting deployment for service: $SERVICE_ARN"
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"

          echo "Deployment triggered successfully!"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName==\`${APPRUNNER_SERVICE_NAME}\`].ServiceUrl" \
            --output text)

          echo "Waiting for deployment to propagate..."
          sleep 60

          echo "Testing health endpoint..."
          curl -f "https://${SERVICE_URL}/health" || echo "Warning: Health check failed (service may still be deploying)"

          echo ""
          echo "App Runner URL: https://${SERVICE_URL}"
          echo "API Docs: https://${SERVICE_URL}/docs"
