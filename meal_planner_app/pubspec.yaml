name: meal_planner_app
description: "Meal Planner & Nutrition Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # Storage
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^13.0.0

  # Code Generation & Immutability
  freezed_annotation: ^2.4.1

  # Functional Programming
  dartz: ^0.10.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.18.1
  email_validator: ^2.1.17
  logger: ^2.0.2

  # Charts & UI
  fl_chart: ^0.66.0
  table_calendar: ^3.0.9

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.4

  # Linting
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
